version: "3.8"

services:
  # Infrastructure (Reusing from original compose)
  postgres:
    image: postgres:15-alpine
    container_name: decp-postgres-prod
    environment:
      POSTGRES_USER: decp_user
      POSTGRES_PASSWORD: decp_password
      POSTGRES_DB: decp_db
    ports:
      - "5433:5432"

  mongodb:
    image: mongo:6.0
    container_name: decp-mongodb-prod
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
    ports:
      - "27018:27017"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: decp-rabbitmq-prod
    ports:
      - "5672:5672"
      - "15672:15672"

  redis:
    image: redis:7-alpine
    container_name: decp-redis-prod
    ports:
      - "6379:6379"

  # Backend Services
  api-gateway:
    build: ./backend/api-gateway
    container_name: decp-gateway-prod
    ports:
      - "8080:8080"
    environment:
      - SPRING_CLOUD_GATEWAY_ROUTES_0_URI=http://auth-service:8081
      - SPRING_CLOUD_GATEWAY_ROUTES_1_URI=http://user-service:8082
      - SPRING_CLOUD_GATEWAY_ROUTES_2_URI=http://user-service:8082
      - SPRING_CLOUD_GATEWAY_ROUTES_3_URI=http://post-service:8083
      - SPRING_CLOUD_GATEWAY_ROUTES_4_URI=http://job-service:8084
      - SPRING_CLOUD_GATEWAY_ROUTES_5_URI=http://event-service:8085
      - SPRING_CLOUD_GATEWAY_ROUTES_6_URI=http://notification-service:8088
      - JWT_SECRET=${JWT_SECRET:-your-very-secure-and-long-secret-key-for-decp-project}
    depends_on:
      - auth-service
      - user-service
      - post-service
      - job-service
      - event-service
      - notification-service

  auth-service:
    build: ./backend/auth-service
    container_name: decp-auth-prod
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/decp_db
      - SPRING_RABBITMQ_HOST=rabbitmq
      - JWT_SECRET=${JWT_SECRET:-your-very-secure-and-long-secret-key-for-decp-project}
    depends_on:
      - postgres
      - rabbitmq

  user-service:
    build: ./backend/user-service
    container_name: decp-user-prod
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/decp_db
      - SPRING_RABBITMQ_HOST=rabbitmq
    depends_on:
      - postgres
      - rabbitmq

  post-service:
    build: ./backend/post-service
    container_name: decp-post-prod
    ports:
      - "8083:8083"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://root:rootpassword@mongodb:27017/decp_posts?authSource=admin
      - SPRING_RABBITMQ_HOST=rabbitmq
    depends_on:
      - mongodb
      - rabbitmq

  job-service:
    build: ./backend/job-service
    container_name: decp-job-prod
    ports:
      - "8084:8084"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/decp_db
      - SPRING_RABBITMQ_HOST=rabbitmq
    depends_on:
      - postgres
      - rabbitmq

  notification-service:
    build: ./backend/notification-service
    container_name: decp-notification-prod
    ports:
      - "8088:8088"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://root:rootpassword@mongodb:27017/decp_notifications?authSource=admin
      - SPRING_RABBITMQ_HOST=rabbitmq
      - REDIS_HOST=redis
    depends_on:
      - mongodb
      - rabbitmq
      - redis

  # Frontend
  web-client:
    build: ./frontend/web-client
    container_name: decp-web-prod
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
