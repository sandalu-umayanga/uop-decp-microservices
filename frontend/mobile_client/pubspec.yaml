name: decp_mobile_app
description: Department Engagement & Career Platform (DECP) mobile application built with Flutter.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State management
  flutter_riverpod: ^3.2.1
  
  # Networking
  dio: ^5.3.3
  
  # Navigation
  go_router: ^17.1.0
  
  # Models & Serialization
  freezed_annotation: ^3.1.0
  json_annotation: ^4.8.1
  
  # Storage
  flutter_secure_storage: ^10.0.0
  
  # WebSocket
  stomp_dart_client: any

  # UI helpers
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.4.6
  freezed: ^3.2.5
  json_serializable: any
  
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
