server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        corsConfigurations:
          "[/**]":
            allowedOrigins: "http://localhost:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

      routes:
        # Auth Service: /api/auth/** -> localhost:8081/api/auth/** (No strip)
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**

        # Public Registration: /api/users/register -> localhost:8082/api/users/register
        - id: user-registration
          uri: http://localhost:8082
          predicates:
            - Path=/api/users/register

        # User Service: /api/users/** -> localhost:8082/api/users/**
        - id: user-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/users/**
          filters:
            - Jwt

        # Post Service: /api/posts/** -> localhost:8083/posts/**
        - id: post-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/posts/**
          filters:
            - Jwt
            - StripPrefix=1

        # Job Service: /api/jobs/** -> localhost:8084/api/jobs/**
        - id: job-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/jobs/**
          filters:
            - Jwt

        # Event Service: /api/events/** -> localhost:8085/api/events/**
        - id: event-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/events/**
          filters:
            - Jwt

management:
  endpoints:
    web:
      exposure:
        include: "*"

jwt:
  secret: ${JWT_SECRET:your-very-secure-and-long-secret-key-for-decp-project}
