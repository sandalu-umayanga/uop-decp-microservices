server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        corsConfigurations:
          "[/**]":
            allowedOrigins: "http://localhost:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

      routes:
        # Auth Service: /api/auth/** -> localhost:8081/api/auth/** (No strip)
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**

        # Public Registration: /api/users/register -> localhost:8082/api/users/register
        - id: user-registration
          uri: http://localhost:8082
          predicates:
            - Path=/api/users/register

        # User Service: /api/users/** -> localhost:8082/api/users/**
        - id: user-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/users/**
          filters:
            - Jwt

        # Post Service: /api/posts/** -> localhost:8083/posts/**
        - id: post-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/posts/**
          filters:
            - Jwt
            - StripPrefix=1

        # Job Service: /api/jobs/** -> localhost:8084/api/jobs/**
        - id: job-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/jobs/**
          filters:
            - Jwt

        # Event Service: /api/events/** -> localhost:8085/api/events/**
        - id: event-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/events/**
          filters:
            - Jwt

        # Notification Service: /api/notifications/** -> localhost:8088/api/notifications/**
        - id: notification-service
          uri: http://localhost:8088
          predicates:
            - Path=/api/notifications/**
          filters:
            - Jwt

        # Messaging Service WebSocket: /ws/** -> localhost:8087
        - id: messaging-service-ws
          uri: ws://localhost:8087
          predicates:
            - Path=/ws/**

        # Messaging Service REST: /api/conversations/** -> localhost:8087
        - id: messaging-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/conversations/**
          filters:
            - Jwt

        # Research Service: /api/research/** -> localhost:8086/api/research/**
        - id: research-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/research/**
          filters:
            - Jwt

        # Analytics Service: /api/analytics/** -> localhost:8089/api/analytics/**
        - id: analytics-service
          uri: http://localhost:8089
          predicates:
            - Path=/api/analytics/**
          filters:
            - Jwt

management:
  endpoints:
    web:
      exposure:
        include: "*"

jwt:
  secret: ${JWT_SECRET:your-very-secure-and-long-secret-key-for-decp-project}
