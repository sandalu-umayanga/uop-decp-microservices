server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        corsConfigurations:
          "[/**]":
            allowedOrigins: ${CORS_ALLOWED_ORIGIN:http://localhost:3000}
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

      routes:
        # Auth Service
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**

        # Public Registration
        - id: user-registration
          uri: ${USER_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/users/register

        # User Service
        - id: user-service
          uri: ${USER_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/users/**
          filters:
            - Jwt

        # Post Service
        - id: post-service
          uri: ${POST_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/posts/**
          filters:
            - Jwt
            - StripPrefix=1

        # Job Service
        - id: job-service
          uri: ${JOB_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/jobs/**
          filters:
            - Jwt

        # Event Service
        - id: event-service
          uri: ${EVENT_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/events/**
          filters:
            - Jwt

        # Notification Service
        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8088}
          predicates:
            - Path=/api/notifications/**
          filters:
            - Jwt

        # Messaging Service WebSocket
        - id: messaging-service-ws
          uri: ${MESSAGING_SERVICE_WS_URL:ws://localhost:8087}
          predicates:
            - Path=/ws/**

        # Messaging Service REST
        - id: messaging-service
          uri: ${MESSAGING_SERVICE_URL:http://localhost:8087}
          predicates:
            - Path=/api/conversations/**
          filters:
            - Jwt

        # Research Service
        - id: research-service
          uri: ${RESEARCH_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/api/research/**
          filters:
            - Jwt

        # Analytics Service
        - id: analytics-service
          uri: ${ANALYTICS_SERVICE_URL:http://localhost:8089}
          predicates:
            - Path=/api/analytics/**
          filters:
            - Jwt

        # Mentorship Service
        - id: mentorship-service
          uri: ${MENTORSHIP_SERVICE_URL:http://localhost:8090}
          predicates:
            - Path=/api/mentorship/**
          filters:
            - Jwt
            - RewritePath=/api/mentorship(?<segment>/?.*), /api/mentorship$\{segment}

cors:
  allowed-origin: ${CORS_ALLOWED_ORIGIN:http://localhost:3000}

management:
  endpoints:
    web:
      exposure:
        include: "*"

jwt:
  secret: ${JWT_SECRET:your-very-secure-and-long-secret-key-for-decp-project}
