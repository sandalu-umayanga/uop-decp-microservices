server:
  port: 8089

spring:
  application:
    name: analytics-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/decp_analytics_db}
    username: ${POSTGRES_USER:decp_user}
    password: ${POSTGRES_PASSWORD:decp_password}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

analytics:
  source:
    user-db-url: ${ANALYTICS_SOURCE_USER_DB_URL:jdbc:postgresql://localhost:5433/decp_user_db}
    job-db-url: ${ANALYTICS_SOURCE_JOB_DB_URL:jdbc:postgresql://localhost:5433/decp_job_db}
    event-db-url: ${ANALYTICS_SOURCE_EVENT_DB_URL:jdbc:postgresql://localhost:5433/decp_event_db}
    research-db-url: ${ANALYTICS_SOURCE_RESEARCH_DB_URL:jdbc:postgresql://localhost:5433/decp_research_db}
    post-mongo-uri: ${ANALYTICS_SOURCE_POST_MONGO_URI:mongodb://admin:admin1234@localhost:27018/decp_posts?authSource=admin}
    messaging-mongo-uri: ${ANALYTICS_SOURCE_MESSAGING_MONGO_URI:mongodb://admin:admin1234@localhost:27018/decp_messaging?authSource=admin}
