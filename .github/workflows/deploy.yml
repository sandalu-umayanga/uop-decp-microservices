name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

jobs:
  # ─────────────────────────────────────────
  # Job 1: Build & test backend
  # ─────────────────────────────────────────
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build all services
        working-directory: backend
        run: ./mvnw clean package -DskipTests -T 4 -B

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-jars
          path: backend/*/target/*.jar
          retention-days: 1

  # ─────────────────────────────────────────
  # Job 2: Build & test frontend
  # ─────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: frontend/web-client/package-lock.json

      - name: Install dependencies
        working-directory: frontend/web-client
        run: npm ci

      - name: Build
        working-directory: frontend/web-client
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/web-client/dist/
          retention-days: 1

  # ─────────────────────────────────────────
  # Job 3: Push images to ECR
  # Runs in parallel per service (matrix).
  # Multi-stage Dockerfiles build inside Docker — no pre-built JARs needed.
  # Only runs on push to main (not PRs)
  # ─────────────────────────────────────────
  push-images:
    name: Push Images to ECR
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service:
          - api-gateway
          - auth-service
          - user-service
          - post-service
          - job-service
          - event-service
          - research-service
          - messaging-service
          - notification-service
          - analytics-service
          - mentorship-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push ${{ matrix.service }}
        run: |
          IMAGE_URI="${ECR_REGISTRY}/decp/${{ matrix.service }}:${{ github.sha }}"
          LATEST_URI="${ECR_REGISTRY}/decp/${{ matrix.service }}:latest"

          docker build \
            -t "${IMAGE_URI}" \
            -t "${LATEST_URI}" \
            -f "backend/${{ matrix.service }}/Dockerfile" \
            backend/

          docker push "${IMAGE_URI}"
          docker push "${LATEST_URI}"

  # ─────────────────────────────────────────
  # Job 4: CDK deploy (infra changes)
  # Only runs on push to main
  # ─────────────────────────────────────────
  cdk-deploy:
    name: CDK Deploy
    runs-on: ubuntu-latest
    needs: push-images
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: infrastructure/package-lock.json

      - name: Install CDK dependencies
        working-directory: infrastructure
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: CDK deploy
        working-directory: infrastructure
        run: npx cdk deploy DecpInfraStack DecpServicesStack --require-approval never -c corsOrigin=${{ secrets.CORS_ALLOWED_ORIGIN }}

  # ─────────────────────────────────────────
  # Job 5: Force ECS redeploy with new images
  # Only runs on push to main
  # ─────────────────────────────────────────
  redeploy-ecs:
    name: Redeploy ECS Services
    runs-on: ubuntu-latest
    needs: cdk-deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Force new deployment for all services
        run: |
          SERVICES=(
            api-gateway auth-service user-service post-service
            job-service event-service research-service messaging-service
            notification-service analytics-service mentorship-service
          )
          for SERVICE in "${SERVICES[@]}"; do
            echo "Redeploying ${SERVICE}..."
            aws ecs update-service \
              --cluster decp-cluster \
              --service "${SERVICE}" \
              --force-new-deployment \
              --no-cli-pager
          done

      - name: Wait for services to stabilize
        run: |
          SERVICES=(
            api-gateway auth-service user-service post-service
            job-service event-service research-service messaging-service
            notification-service analytics-service mentorship-service
          )
          for SERVICE in "${SERVICES[@]}"; do
            echo "Waiting for ${SERVICE}..."
            aws ecs wait services-stable \
              --cluster decp-cluster \
              --services "${SERVICE}"
          done
          echo "All services stable."

  # ─────────────────────────────────────────
  # Job 6: Deploy frontend to S3
  # Only runs on push to main
  # ─────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend to S3
    runs-on: ubuntu-latest
    needs: build-frontend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload to S3
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET }} \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"

          # index.html must never be cached so browsers always get the latest
          aws s3 cp dist/index.html s3://${{ secrets.S3_BUCKET }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"
