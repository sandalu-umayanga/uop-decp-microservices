server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: user-service
              uri: ${USER_SERVICE_URL:http://localhost:8081}
              predicates:
                - Path=/api/users/**

            # --- NEW FEED SERVICE ROUTE ---
            - id: feed-service
              uri: ${FEED_SERVICE_URL:http://localhost:8082}
              predicates:
                - Path=/api/posts/**

            # --- NEW CAREER SERVICE ROUTE ---
            - id: career-service
              uri: ${CAREER_SERVICE_URL:http://localhost:8083}
              predicates:
                - Path=/api/jobs/**