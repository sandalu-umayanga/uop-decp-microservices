server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # Route for the User Management Module
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/users/**

        # Route for the Feed & Media Module
        - id: feed-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/posts/**

        # Route for the Career & Opportunity Module
        - id: career-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/jobs/**