server:
  port: 8083

spring:
  application:
    name: career-service

  datasource:
    # Notice the new createDatabaseIfNotExist=true flag right after the database name!
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3308/decp_careers?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: root
    password: rootpassword
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect